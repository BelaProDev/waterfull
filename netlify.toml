[[redirects]]
from = "/api*"
to = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/find"
to = "/index.html"
status = 200

[[redirects]]
from = "/add"
to = "/index.html"
status = 200

[[redirects]]
from = "/logs"
to = "/index.html"
status = 200

[[redirects]]
from = "/*"
to = "/"
status = 301

[dev]
  command = "vite"
  targetPort = 3000